services:
  # Backend API
  - type: web
    name: nexuscrm-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nexuscrm-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: nexuscrm-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://nexuscrm-web.onrender.com
    plan: free

  # Frontend
  - type: web
    name: nexuscrm-web
    runtime: node
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: nexuscrm-api
          type: web
          property: host
          transform: https://{value}
    plan: free

  # Redis (Key Value store)
  - type: redis
    name: nexuscrm-redis
    plan: free
    ipAllowList: []

databases:
  - name: nexuscrm-db
    plan: free
    databaseName: nexuscrm
    user: nexus

