version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: nexuscrm
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexuscrm"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data

  backend:
    image: ghcr.io/kushdab/nexuscrm-backend:${TAG:-latest}
    restart: always
    env_file: .env.prod
    depends_on:
      postgres:
        condition: service_healthy
    expose: ["8000"]
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4"

  worker:
    image: ghcr.io/kushdab/nexuscrm-backend:${TAG:-latest}
    restart: always
    env_file: .env.prod
    depends_on: [postgres, redis]
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4

  frontend:
    image: ghcr.io/kushdab/nexuscrm-frontend:${TAG:-latest}
    restart: always
    env_file: .env.prod
    expose: ["3000"]
    depends_on: [backend]

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on: [backend, frontend]

volumes:
  pgdata:
  redisdata:
  caddy_data:
  caddy_config:
